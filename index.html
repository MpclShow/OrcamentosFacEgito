<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EGITO - Sistema de Orçamento</title>

<style>
:root {
    --primary: #164af5;
    --secondary: #00ffff;
    --bg-dark: #121217;
    --bg-card: #1e1e26;
    --bg-item: #0a0a0f;
    --text: #ffffff;
}

*{ box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body{
    background: radial-gradient(circle at top, #1c1c2b, var(--bg-dark));
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    padding: 20px;
    margin: 0;
    min-height: 100vh;
}

h1{
    text-align: center;
    letter-spacing: 3px;
    text-shadow: 0 0 15px var(--primary);
    margin-bottom: 20px;
}

.container{
    display: flex;
    gap: 20px;
    max-width: 1200px;
    margin: 0 auto;
}

.itens{
    flex: 2;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 20px;
}

.categoria{
    background: var(--bg-card);
    padding: 15px;
    border-radius: 12px;
    border: 1px solid #2d2d3d;
}

.categoria h3 {
    margin-top: 0;
    border-left: 4px solid var(--primary);
    padding-left: 10px;
    color: var(--secondary);
}

.item{
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--bg-item);
    padding: 10px;
    margin: 8px 0;
    border-radius: 8px;
}

.calculadora{
    flex: 1;
    background: var(--bg-card);
    padding: 20px;
    border-radius: 12px;
    position: sticky;
    top: 20px;
    height: fit-content;
    border: 1px solid #2d2d3d;
}

.status{
    text-align: center;
    padding: 10px;
    border-radius: 8px;
    font-weight: bold;
    margin-bottom: 15px;
}

.parceria{ background: rgba(0, 255, 255, 0.1); color: var(--secondary); border: 1px solid var(--secondary); }
.normal{ background: rgba(255, 44, 44, 0.1); color: #ff2c2c; border: 1px solid #ff2c2c; }

/* --- ESTILO DO RESUMO ALINHADO --- */
.resumo{
    background: rgba(0,0,0,0.4);
    padding: 12px;
    margin: 15px 0;
    border-radius: 8px;
    max-height: 300px;
    overflow-y: auto;
    font-family: 'Courier New', Courier, monospace; /* Fonte mono para garantir alinhamento */
}

.resumo-header {
    display: grid;
    grid-template-columns: 2fr 1fr 1.5fr;
    font-weight: bold;
    border-bottom: 1px solid var(--primary);
    padding-bottom: 5px;
    margin-bottom: 5px;
    font-size: 0.8rem;
    color: var(--secondary);
}

.resumo-linha {
    display: grid;
    grid-template-columns: 2fr 1fr 1.5fr; /* Nome | Qtd | Valor */
    font-size: 0.8rem;
    margin-bottom: 3px;
    border-bottom: 1px solid #333;
}

.resumo-linha span:nth-child(2) { text-align: center; }
.resumo-linha span:nth-child(3) { text-align: right; }

.total-info { display: flex; justify-content: space-between; margin: 8px 0; font-weight: bold; }
.valor { color: #4eff4e; }

button{
    padding: 8px 12px;
    border: none;
    border-radius: 4px;
    background: var(--primary);
    color: white;
    cursor: pointer;
}

.botoes-acao { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }

@media (max-width: 900px) {
    .container { flex-direction: column; }
    .calculadora { position: static; }
}
</style>
</head>
<body>

<h1>SISTEMA EGITO</h1>

<div class="container">
    <div class="itens" id="itens"></div>

    <div class="calculadora">
        <div id="statusModo" class="status normal">🔴 MODO NORMAL</div>
        
        <label style="cursor:pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 15px;">
            <input type="checkbox" id="modoCheck" onchange="toggleModo()"> Tabela Parceria
        </label>

        <div class="resumo-header" id="resumoHeader" style="display:none;">
            <span>ITEM</span>
            <span style="text-align:center;">QTD</span>
            <span style="text-align:right;">SUBTOTAL</span>
        </div>
        <div class="resumo" id="resumo">Nenhum item selecionado</div>

        <div class="total-info">Total: <span id="total" class="valor">R$ 0,00</span></div>
        <div class="total-info" style="color: #bbb; font-size: 0.85rem;">Vendedor (30%): <span id="vendedor">R$ 0,00</span></div>
        <div class="total-info" style="color: #bbb; font-size: 0.85rem;">FAC (70%): <span id="empresa">R$ 0,00</span></div>

        <div class="botoes-acao">
            <button onclick="copiar()">Copiar Orçamento</button>
            <button style="background:#800;" onclick="limpar()">Limpar</button>
        </div>
    </div>
</div>

<script>
let modo = "normal";
let selecionados = {};

const produtos = {
    "Armamento Pesado": [
        {nome: "AK-47", parceria: 258120, normal: 286800},
        {nome: "G3-MK2", parceria: 322650, normal: 358500},
        {nome: "M-tar 21", parceria: 218160, normal: 242400},
        {nome: "Remington", parceria: 190890, normal: 212100}
    ],
    "Armamento Leve": [
        {nome: "Five 7", parceria: 116910, normal: 129900},
        {nome: "Micro Uzi", parceria: 93285, normal: 103650}
    ],
    "Utilidades": [
        {nome: "LSD", parceria: 600, normal: 750}
    ]
};

const mapaProdutos = {};
for(let cat in produtos) {
    produtos[cat].forEach((p, i) => { mapaProdutos[cat + i] = p; });
}

function render() {
    const c = document.getElementById("itens");
    c.innerHTML = "";
    for(let cat in produtos) {
        let html = `<div class="categoria"><h3>${cat}</h3>`;
        produtos[cat].forEach((p, i) => {
            const id = cat + i;
            const qtd = selecionados[id] || 0;
            html += `
                <div class="item">
                    <div style="font-size:0.9rem"><strong>${p.nome}</strong><br>${formatar(p[modo])}</div>
                    <div style="display:flex; gap:5px; align-items:center;">
                        <button onclick="ajustar('${id}', -1)">-</button>
                        <input type="number" id="${id}" value="${qtd}" oninput="manual('${id}')" style="width:50px; text-align:center; background:#000; color:#fff; border:1px solid var(--primary);">
                        <button onclick="ajustar('${id}', 1)">+</button>
                    </div>
                </div>`;
        });
        html += "</div>";
        c.innerHTML += html;
    }
    calcular();
}

function ajustar(id, val) {
    const input = document.getElementById(id);
    let n = (parseInt(input.value) || 0) + val;
    input.value = n < 0 ? 0 : n;
    manual(id);
}

function manual(id) {
    selecionados[id] = parseInt(document.getElementById(id).value) || 0;
    calcular();
}

function toggleModo() {
    modo = document.getElementById("modoCheck").checked ? "parceria" : "normal";
    document.getElementById("statusModo").className = "status " + modo;
    document.getElementById("statusModo").innerText = modo === "parceria" ? "🟢 MODO PARCERIA" : "🔴 MODO NORMAL";
    render();
}

function calcular() {
    let total = 0;
    let resumoHTML = "";
    let temItem = false;
    
    for(let id in mapaProdutos) {
        const qtd = selecionados[id] || 0;
        if(qtd > 0) {
            temItem = true;
            const p = mapaProdutos[id];
            const sub = qtd * p[modo];
            total += sub;
            resumoHTML += `<div class="resumo-linha"><span>${p.nome}</span><span>x${qtd}</span><span>${formatar(sub)}</span></div>`;
        }
    }

    document.getElementById("resumoHeader").style.display = temItem ? "grid" : "none";
    document.getElementById("resumo").innerHTML = resumoHTML || "Nenhum item selecionado";
    document.getElementById("total").innerText = formatar(total);
    document.getElementById("vendedor").innerText = formatar(total * 0.3);
    document.getElementById("empresa").innerText = formatar(total * 0.7);
}

function copiar() {
    let texto = "═══ 💸 ORÇAMENTO EGITO 💸 ═══\n";
    texto += "ITEM            | QTD | SUBTOTAL\n";
    texto += "--------------------------------\n";
    
    let flag = false;
    for(let id in selecionados) {
        if(selecionados[id] > 0) {
            flag = true;
            const p = mapaProdutos[id];
            const nome = p.nome.padEnd(15, " ");
            const qtd = selecionados[id].toString().padStart(3, " ");
            const sub = formatar(selecionados[id] * p[modo]).padStart(12, " ");
            texto += `${nome} | ${qtd} | ${sub}\n`;
        }
    }

    if(!flag) return alert("Adicione itens!");

    texto += "--------------------------------\n";
    texto += `TOTAL: ${document.getElementById("total").innerText}\n`;
    texto += `VENDEDOR: ${document.getElementById("vendedor").innerText}\n`;
    texto += "═══ EGITO ARSENAL ═══";

    navigator.clipboard.writeText(texto);
    alert("Orçamento copiado com sucesso!");
}

function limpar() {
    selecionados = {};
    render();
}

function formatar(v) {
    return v.toLocaleString("pt-BR", {style: "currency", currency: "BRL"});
}

window.onload = render;
</script>

</body>
</html>
